- name: Gather package manager
  ansible.builtin.set_fact:
    pkg_mgr: "{{ ansible_facts['pkg_mgr'] }}"

- name: Update package cache (apt)
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: pkg_mgr == 'apt'

- name: Update package cache (pacman)
  ansible.builtin.pacman:
    update_cache: yes
  when: pkg_mgr == 'pacman'

- name: Install packages for detected package manager
  block:
    - name: Set install_packages
      ansible.builtin.set_fact:
        install_packages: "{{ pkg_map[pkg_mgr] | default([]) }}"

    - name: Validate package map for detected manager
      ansible.builtin.assert:
        that:
          - pkg_map is mapping
          - pkg_mgr in pkg_map
        fail_msg: "No package map entry for detected package manager '{{ pkg_mgr }}'."

    - name: Show selected package count
      ansible.builtin.debug:
        msg: "pkg_mgr={{ pkg_mgr }}, install_packages_count={{ install_packages | length }}"

    - name: Install packages (apt)
      ansible.builtin.apt:
        name: "{{ install_packages }}"
        state: present
      when:
        - pkg_mgr == 'apt'
        - install_packages | length > 0

    - name: Install packages (pacman)
      ansible.builtin.pacman:
        name: "{{ install_packages }}"
        state: present
      when:
        - pkg_mgr == 'pacman'
        - install_packages | length > 0

# Microsoft repository setup is only needed for apt-based systems
- name: Microsoft repository setup (Ubuntu/Debian)
  block:
    - name: Install pre-requisite packages
      ansible.builtin.apt:
        name: software-properties-common
        state: present
      when: ansible_facts['distribution'] == 'Ubuntu'

    - name: Compute Microsoft repository version
      ansible.builtin.set_fact:
        ms_repo_version: "{{ ansible_facts['distribution_version'] if ansible_facts['distribution'] == 'Ubuntu' else ansible_facts['distribution_major_version'] }}"

    - name: Download Microsoft repository package
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/config/{{ ansible_facts['distribution'] | lower }}/{{ ms_repo_version }}/packages-microsoft-prod.deb"
        dest: /tmp/packages-microsoft-prod.deb

    - name: Register Microsoft repository
      ansible.builtin.apt:
        deb: /tmp/packages-microsoft-prod.deb

    - name: Remove Microsoft repository package file
      ansible.builtin.file:
        path: /tmp/packages-microsoft-prod.deb
        state: absent
  when: pkg_mgr == 'apt'