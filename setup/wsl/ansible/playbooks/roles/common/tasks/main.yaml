- name: Gather package manager
  ansible.builtin.set_fact:
    pkg_mgr: "{{ ansible_pkg_mgr }}"

- name: Remove stale gierens apt source (eza installed from GitHub)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/gierens.list
    - /etc/apt/keyrings/gierens.gpg
  when: pkg_mgr == 'apt'

- name: Update package cache (apt)
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: pkg_mgr == 'apt'

- name: Update package cache (pacman)
  ansible.builtin.pacman:
    update_cache: yes
  when: pkg_mgr == 'pacman'

- name: Install packages for detected package manager
  block:
    - name: Set install_packages
      ansible.builtin.set_fact:
        install_packages: "{{ pkg_map[pkg_mgr] | default([]) }}"

    - name: Validate package map for detected manager
      ansible.builtin.assert:
        that:
          - pkg_map is mapping
          - pkg_mgr in pkg_map
        fail_msg: "No package map entry for detected package manager '{{ pkg_mgr }}'."

    - name: Show selected package count
      ansible.builtin.debug:
        msg: "pkg_mgr={{ pkg_mgr }}, install_packages_count={{ install_packages | length }}"

    - name: Install packages (apt)
      ansible.builtin.apt:
        name: "{{ install_packages }}"
        state: present
      when:
        - pkg_mgr == 'apt'
        - install_packages | length > 0

    - name: Install packages (pacman)
      ansible.builtin.pacman:
        name: "{{ install_packages }}"
        state: present
      when:
        - pkg_mgr == 'pacman'
        - install_packages | length > 0

    - name: Install packages (apk)
      ansible.builtin.apk:
        name: "{{ install_packages }}"
        state: present
      when:
        - pkg_mgr == 'apk'
        - install_packages | length > 0

# APT-specific repo and key tasks
- name: Add Microsoft packages repo (apt)
  block:
    - name: Download Microsoft packages prod deb
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version | default(ansible_lsb.release) }}/packages-microsoft-prod.deb"
        dest: /tmp/packages-microsoft-prod.deb

    - name: Install Microsoft packages deb
      ansible.builtin.apt:
        deb: /tmp/packages-microsoft-prod.deb

    - name: Remove Microsoft deb file
      ansible.builtin.file:
        path: /tmp/packages-microsoft-prod.deb
        state: absent

    - name: Download Microsoft GPG key
      ansible.builtin.shell: wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > /tmp/microsoft.gpg

    - name: Install Microsoft GPG key
      ansible.builtin.shell: install -D -o root -g root -m 644 /tmp/microsoft.gpg /usr/share/keyrings/microsoft.gpg

    - name: Remove Microsoft GPG file
      ansible.builtin.file:
        path: /tmp/microsoft.gpg
        state: absent

    - name: Add VS Code repository (apt)
      ansible.builtin.copy:
        content: |
          Types: deb
          URIs: https://packages.microsoft.com/repos/code
          Suites: stable
          Components: main
          Architectures: amd64,arm64,armhf
          Signed-By: /usr/share/keyrings/microsoft.gpg
        dest: /etc/apt/sources.list.d/vscode.sources
  when: pkg_mgr == 'apt'