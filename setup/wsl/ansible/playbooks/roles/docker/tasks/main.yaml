- name: Resolve shell target username
  ansible.builtin.set_fact:
    username: "{{ username | default(wsl_default_user | default(default_user | default(ansible_user_id)), true) }}"

- name: Install Docker
  apt:
    name: docker.io
    state: present
  when: docker_enabled

- name: Add user to docker group
  user:
    name: "{{ username }}"
    groups: docker
    append: yes
  when: docker_enabled