# Install tfenv (Terraform version manager)
- name: Clone tfenv repository
  git:
    repo: https://github.com/tfutils/tfenv.git
    dest: "/home/{{ username }}/.tfenv"
    version: master

- name: Add tfenv to PATH
  lineinfile:
    path: "/home/{{ username }}/.zshrc"
    line: 'export PATH="$HOME/.tfenv/bin:$PATH"'

# Install terraform versions with tfenv
- name: Install pinned Terraform version
  become_user: "{{ username }}"
  shell: |
    export PATH="$HOME/.tfenv/bin:$PATH"
    tfenv install {{ terraform_version }}
    tfenv use {{ terraform_version }}
  when: terraform_version is defined