- name: Install dev packages
  apt:
    name: "{{ dev_packages }}"
    state: present

# Install Starship (cross-shell prompt)
- name: Install Starship (cross-shell prompt)
  shell: |
    curl -sS https://starship.rs/install.sh | sh -s -- -y
  args:
    creates: /usr/local/bin/starship

# Install eza (ls replacement)
- name: Download latest eza release (amd64)
  get_url:
    url: https://github.com/eza-community/eza/releases/download/{{ eza_version }}/eza_x86_64-unknown-linux-gnu.tar.gz
    dest: /tmp/eza.tar.gz
    mode: '0644'

- name: Extract eza binary
  unarchive:
    src: /tmp/eza.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Move eza binary to /usr/local/bin
  copy:
    src: /tmp/eza
    dest: /usr/local/bin/eza
    mode: '0755'
    remote_src: yes

- name: Cleanup eza archive
  file:
    path: /tmp/eza.tar.gz
    state: absent

