- name: Prevent services from auto-starting (WSL best practice)
  copy:
    dest: /usr/sbin/policy-rc.d
    content: |
      #!/bin/sh
      exit 101
    mode: '0755'

- name: Configure WSL default Linux user
  become: true
  when: wsl_default_user is defined and (wsl_default_user | length > 0)
  block:
    - name: Validate Linux username
      ansible.builtin.assert:
        that:
          - wsl_default_user is match('^[a-z_][a-z0-9_-]*$')
        fail_msg: "Invalid Linux username '{{ wsl_default_user }}'."

    - name: Check if user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ wsl_default_user }}"
      register: user_check
      failed_when: false
      changed_when: false

    - name: Determine if target user exists
      ansible.builtin.set_fact:
        wsl_user_exists: "{{ user_check.ansible_facts.getent_passwd is defined and (wsl_default_user in user_check.ansible_facts.getent_passwd) }}"

    - name: Create user and configure as default
      block:
        - name: Create the user
          ansible.builtin.user:
            name: "{{ wsl_default_user }}"
            shell: /bin/bash
            create_home: true
            groups: sudo
            append: true
            state: present

        - name: Ensure /etc/wsl.conf has [user] default
          ansible.builtin.ini_file:
            path: /etc/wsl.conf
            section: user
            option: default
            value: "{{ wsl_default_user }}"
            mode: "0644"
            backup: true

        - name: Create .sudo_as_admin_successful
          ansible.builtin.file:
            path: "/home/{{ wsl_default_user }}/.sudo_as_admin_successful"
            state: touch
            owner: "{{ wsl_default_user }}"
            group: "{{ wsl_default_user }}"
            mode: "0644"

        - name: Create .hushlogin
          ansible.builtin.file:
            path: "/home/{{ wsl_default_user }}/.hushlogin"
            state: touch
            owner: "{{ wsl_default_user }}"
            group: "{{ wsl_default_user }}"
            mode: "0644"

        - name: Ensure home directory ownership is correct
          ansible.builtin.file:
            path: "/home/{{ wsl_default_user }}"
            owner: "{{ wsl_default_user }}"
            group: "{{ wsl_default_user }}"
            mode: "0755"
            recurse: yes
      when: not wsl_user_exists

    - name: Ask whether to change existing user password
      become: false
      ansible.builtin.pause:
        prompt: "User {{ wsl_default_user }} already exists. Change password? (y/N)"
      register: change_existing_user_password
      changed_when: false
      when: wsl_user_exists

    - name: Decide whether password should be set
      ansible.builtin.set_fact:
        wsl_set_user_password: "{{ (not wsl_user_exists) or ((change_existing_user_password.user_input | default('n') | trim | lower) in ['y', 'yes']) }}"

    - name: Prompt for password and set it when requested
      block:

        - name: Prompt for user password
          become: false
          ansible.builtin.pause:
            prompt: "Enter password for {{ wsl_default_user }}"
            echo: false
          register: user_password_input
          no_log: true

        - name: Prompt for password confirmation
          become: false
          ansible.builtin.pause:
            prompt: "Confirm password for {{ wsl_default_user }} (re-enter until it matches)"
            echo: false
          register: user_password_confirm
          until: user_password_confirm.user_input == user_password_input.user_input
          retries: 10
          delay: 0
          no_log: true

        - name: Set user password (hashed)
          ansible.builtin.user:
            name: "{{ wsl_default_user }}"
            password: "{{ user_password_input.user_input | password_hash('sha512') }}"
          no_log: true
      when: wsl_set_user_password

- name: Configure WSL settings
  copy:
    dest: /etc/wsl.conf
    content: |
      {% if wsl_default_user is defined and (wsl_default_user | length > 0) %}
      [user]
      default={{ wsl_default_user }}

      {% endif %}
      [boot]
      systemd=true

      [network]
      generateHosts=true
      generateResolvConf=true

      [interop]
      enabled=true
      appendWindowsPath=true