- name: Resolve shell target username
  ansible.builtin.set_fact:
    username: "{{ username | default(wsl_default_user | default(default_user | default(ansible_facts['user_id'])), true) }}"

- name: Detect Windows username from host environment
  ansible.builtin.shell: "/mnt/c/Windows/System32/cmd.exe /c echo %USERNAME%"
  register: windows_username_cmd
  changed_when: false
  failed_when: false

- name: Resolve Windows username for mounted profile path
  ansible.builtin.set_fact:
    windows_user: >-
      {{
        windows_user
          | default(lookup('env', 'USERNAME'), true)
          | default(windows_username_cmd.stdout | trim, true)
          | default((playbook_dir.split('/')[4] if (playbook_dir is defined and playbook_dir.startswith('/mnt/c/Users/')) else ''), true)
            | default((ansible_facts['env']['PWD'].split('/')[4] if (ansible_facts['env']['PWD'] is defined and ansible_facts['env']['PWD'].startswith('/mnt/c/Users/')) else ''), true)
            | default((ansible_facts['env']['SUDO_USER'] if (ansible_facts['env']['SUDO_USER'] is defined and ansible_facts['env']['SUDO_USER'] != 'root') else ''), true)
            | default((ansible_facts['env']['USER'] if (ansible_facts['env']['USER'] is defined and ansible_facts['env']['USER'] != 'root') else ''), true)
      }}

- name: Check resolved Windows profile directory
  ansible.builtin.stat:
    path: "/mnt/c/Users/{{ windows_user }}"
  register: windows_profile_dir

- name: Validate resolved Windows profile directory
  ansible.builtin.assert:
    that:
      - windows_user is defined
      - windows_user | length > 0
      - windows_profile_dir.stat.exists
    fail_msg: "Unable to resolve Windows profile path under /mnt/c/Users. Set windows_user explicitly if auto-detection is incorrect."
    
- name: Remove existing SSH symlink if present
  file:
    path: "/home/{{ username }}/.ssh"
    state: absent
  when: ansible_facts['local'] is not defined or true

- name: Ensure WSL SSH directory exists with correct permissions
  file:
    path: "/home/{{ username }}/.ssh"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0700'

- name: Copy Windows SSH files into WSL with correct permissions
  ansible.builtin.shell: |
    cp -f /mnt/c/Users/{{ windows_user }}/.ssh/* /home/{{ username }}/.ssh/ 2>/dev/null || true
    chown -R {{ username }}:{{ username }} /home/{{ username }}/.ssh
    chmod 700 /home/{{ username }}/.ssh
    chmod 600 /home/{{ username }}/.ssh/*