---
# Main tasks for WSL setup role

- name: Determine default user (UID 1000)
  become: true
  ansible.builtin.command: getent passwd 1000 | cut -d: -f1
  register: default_user_cmd
  changed_when: false
  failed_when: false

- name: Set default_user fact
  ansible.builtin.set_fact:
    default_user: "{{ default_user_cmd.stdout | default(ansible_env.SUDO_USER | default(ansible_user_id)) }}"

- name: Gather package manager
  ansible.builtin.set_fact:
    pkg_mgr: "{{ ansible_pkg_mgr }}"

- name: Update package cache (apt)
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: pkg_mgr == 'apt'

- name: Update package cache (pacman)
  ansible.builtin.pacman:
    update_cache: yes
  when: pkg_mgr == 'pacman'

- name: Install packages for detected package manager
  block:
    - name: Set install_packages
      ansible.builtin.set_fact:
        install_packages: "{{ pkg_map[pkg_mgr] | default([]) }}"

    - name: Install packages (apt)
      ansible.builtin.apt:
        name: "{{ install_packages }}"
        state: present
      when: pkg_mgr == 'apt'

    - name: Install packages (pacman)
      ansible.builtin.pacman:
        name: "{{ install_packages }}"
        state: present
      when: pkg_mgr == 'pacman'

    - name: Install packages (apk)
      ansible.builtin.apk:
        name: "{{ install_packages }}"
        state: present
      when: pkg_mgr == 'apk'
  when: install_packages is not skipped

# APT-specific repo and key tasks
- name: Add Microsoft packages repo (apt)
  block:
    - name: Download Microsoft packages prod deb
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version | default(ansible_lsb.release) }}/packages-microsoft-prod.deb"
        dest: /tmp/packages-microsoft-prod.deb

    - name: Install Microsoft packages deb
      ansible.builtin.apt:
        deb: /tmp/packages-microsoft-prod.deb

    - name: Remove Microsoft deb file
      ansible.builtin.file:
        path: /tmp/packages-microsoft-prod.deb
        state: absent
  when: pkg_mgr == 'apt'

- name: Install HashiCorp repo (apt)
  block:
    - name: Add HashiCorp GPG key
      ansible.builtin.apt_key:
        url: https://apt.releases.hashicorp.com/gpg
        state: present

    - name: Add HashiCorp repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_lsb.codename | default(ansible_distribution_release) }} main"
        state: present
  when: pkg_mgr == 'apt'

- name: Create common dotfiles markers for default user
  become: true
  ansible.builtin.file:
    path: "/home/{{ default_user }}/.{{ item }}"
    state: touch
    owner: "{{ default_user }}"
    mode: '0644'
  loop:
    - sudo_as_admin_successful
    - hushlogin

- name: Copy SSH keys from Windows (if present)
  block:
    - name: Check for Windows ssh path
      ansible.builtin.stat:
        path: "/mnt/c/Users/{{ default_user }}/.ssh"
      register: win_ssh

    - name: Copy SSH directory from Windows
      ansible.builtin.command: cp -r /mnt/c/Users/{{ default_user }}/.ssh /home/{{ default_user }}/
      args:
        creates: "/home/{{ default_user }}/.ssh"
      become_user: root
      when: win_ssh.stat.exists

    - name: Fix ssh permissions
      ansible.builtin.file:
        path: "/home/{{ default_user }}/.ssh/id_ed25519"
        mode: '0600'
        owner: "{{ default_user }}"
        group: "{{ default_user }}"
      when: win_ssh.stat.exists
  when: ansible_virtualization_type == 'wsl' or ansible_env.WSL_DISTRO_NAME is defined

- name: Clone dotfiles with yadm as default_user
  ansible.builtin.git:
    repo: "{{ dotfiles_repo }}"
    dest: "/home/{{ default_user }}/dotfiles-yadm-clone"
    accept_hostkey: yes
    update: yes
  become_user: "{{ default_user }}"

- name: Install starship (as default user)
  ansible.builtin.shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
  args:
    executable: /bin/bash
  become_user: "{{ default_user }}"

- name: Clone tfenv for default user
  ansible.builtin.git:
    repo: "{{ tfenv_repo }}"
    dest: "/home/{{ default_user }}/.tfenv"
    depth: 1
  become_user: "{{ default_user }}"

- name: Ensure zsh is default shell for default user
  ansible.builtin.user:
    name: "{{ default_user }}"
    shell: "/usr/bin/zsh"
  ignore_errors: yes
